<div class="rv-mgr-layout" [class.rv-mgr-layout--open]="sidebarOpen()">
  <!-- Mobile overlay -->
  <div class="rv-mgr-overlay" (click)="closeSidebar()"></div>

  <!-- ── Sidebar ──────────────────────────────────────────────────────────── -->
  <aside class="rv-mgr-sidebar glass-strong">
    <div class="rv-mgr-sidebar__brand">
      <a routerLink="/" class="rv-mgr-sidebar__logo" (click)="closeSidebar()">
        <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="14" fill="#f5a520" />
          <path d="M10 8v12M14 8v5a3 3 0 0 0 3 3v4" stroke="#000" stroke-width="2" stroke-linecap="round" />
        </svg>
        <span class="rv-mgr-sidebar__brand-name">EasyToEat</span>
      </a>
      <span class="rv-mgr-sidebar__badge">{{ roleLabel() }}</span>
    </div>

    @let acc = account();
    @if (acc) {
      <div class="rv-mgr-sidebar__user">
        <div class="rv-mgr-sidebar__user-name">{{ acc.firstName }} {{ acc.lastName }}</div>
        <div class="rv-mgr-sidebar__user-login">&#64;{{ acc.login }}</div>
      </div>
    }

    <div class="rv-mgr-sidebar__divider"></div>

    <nav class="rv-mgr-sidebar__nav">
      <!-- Floor Plan -->
      <a class="rv-mgr-nav-item" routerLink="/manager/floor-plan" routerLinkActive="rv-mgr-nav-item--active" (click)="closeSidebar()">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
        </svg>
        <span>Harta sălii</span>
      </a>

      <!-- Reservations -->
      <a class="rv-mgr-nav-item" routerLink="/manager/rezervari" routerLinkActive="rv-mgr-nav-item--active" (click)="closeSidebar()">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
        </svg>
        <span>Rezervări</span>
      </a>

      <!-- Staff management -->
      <a class="rv-mgr-nav-item" routerLink="/manager/personal" routerLinkActive="rv-mgr-nav-item--active" (click)="closeSidebar()">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        <span>Personal</span>
      </a>

      <!-- Menu -->
      <a class="rv-mgr-nav-item" routerLink="/manager/meniu" routerLinkActive="rv-mgr-nav-item--active" (click)="closeSidebar()">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
        </svg>
        <span>Meniu</span>
      </a>

      <!-- Reports -->
      <a class="rv-mgr-nav-item" routerLink="/manager/rapoarte" routerLinkActive="rv-mgr-nav-item--active" (click)="closeSidebar()">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="18" y1="20" x2="18" y2="10" />
          <line x1="12" y1="20" x2="12" y2="4" />
          <line x1="6" y1="20" x2="6" y2="14" />
        </svg>
        <span>Rapoarte</span>
      </a>
    </nav>

    <div class="rv-mgr-sidebar__divider"></div>
    <div class="rv-mgr-sidebar__footer">
      <a routerLink="/" class="rv-mgr-nav-item rv-mgr-nav-item--back" (click)="closeSidebar()">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="19" y1="12" x2="5" y2="12" />
          <polyline points="12 19 5 12 12 5" />
        </svg>
        <span>Site public</span>
      </a>
    </div>
  </aside>

  <!-- ── Main ─────────────────────────────────────────────────────────────── -->
  <div class="rv-mgr-body">
    <header class="rv-mgr-topbar glass-strong">
      <button class="rv-mgr-hamburger" (click)="toggleSidebar()" [attr.aria-expanded]="sidebarOpen()">
        <span></span><span></span><span></span>
      </button>
      <div class="rv-mgr-topbar__center">
        <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="14" fill="#f5a520" />
          <path d="M10 8v12M14 8v5a3 3 0 0 0 3 3v4" stroke="#000" stroke-width="2" stroke-linecap="round" />
        </svg>
        <span>Panou {{ roleLabel() }}</span>
      </div>
      <a routerLink="/" class="rv-mgr-topbar__home">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
      </a>
    </header>
    <main class="rv-mgr-content">
      <router-outlet />
    </main>
  </div>
</div>
