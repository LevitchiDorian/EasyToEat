@if (user) {
  <form name="deleteForm" (ngSubmit)="confirmDelete(user.login!)">
    <div class="modal-header" style="background: hsl(var(--card)); border-bottom: 1px solid hsl(var(--border) / 0.5)">
      <h5 class="modal-title" style="color: hsl(var(--foreground)); font-weight: 600">Confirmare ștergere</h5>
    </div>

    <div class="modal-body" style="background: hsl(var(--card)); color: hsl(var(--foreground))">
      <jhi-alert-error />
      <p style="color: hsl(var(--muted-foreground)); margin: 0">
        Ești sigur că vrei să ștergi utilizatorul
        <strong style="color: hsl(var(--foreground))">{{ user.login }}</strong
        >? Această acțiune este ireversibilă.
      </p>
    </div>

    <div class="modal-footer" style="background: hsl(var(--card)); border-top: 1px solid hsl(var(--border) / 0.5); gap: 0.5rem">
      <button type="button" class="rv-btn rv-btn--ghost" (click)="cancel()">
        <fa-icon icon="ban"></fa-icon>
        Anulează
      </button>
      <button type="submit" class="rv-btn rv-btn--danger">
        <fa-icon icon="times"></fa-icon>
        Șterge
      </button>
    </div>
  </form>
}
