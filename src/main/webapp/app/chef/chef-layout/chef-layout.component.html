<div class="chef-layout">
  <header class="chef-topbar glass-strong">
    <div class="chef-topbar__left">
      <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="14" fill="#f5a520" />
        <path d="M10 8v12M14 8v5a3 3 0 0 0 3 3v4" stroke="#000" stroke-width="2" stroke-linecap="round" />
      </svg>
      <span class="chef-topbar__brand">EasyToEat</span>
      <span class="chef-topbar__sep">·</span>
      <span class="chef-topbar__title">Bucătărie</span>
    </div>

    <nav class="chef-nav">
      <a routerLink="/chef" routerLinkActive="chef-nav__link--active" [routerLinkActiveOptions]="{ exact: true }" class="chef-nav__link">
        <svg
          width="13"
          height="13"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6z" />
          <line x1="6" y1="17" x2="18" y2="17" />
        </svg>
        Live
      </a>
      <a routerLink="/chef/istoric" routerLinkActive="chef-nav__link--active" class="chef-nav__link">
        <svg
          width="13"
          height="13"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 8v4l3 3" />
          <circle cx="12" cy="12" r="10" />
        </svg>
        Istoric
      </a>
      <a routerLink="/chef/raport" routerLinkActive="chef-nav__link--active" class="chef-nav__link">
        <svg
          width="13"
          height="13"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="18" y1="20" x2="18" y2="10" />
          <line x1="12" y1="20" x2="12" y2="4" />
          <line x1="6" y1="20" x2="6" y2="14" />
        </svg>
        Raport
      </a>
    </nav>

    <div class="chef-topbar__right">
      <span class="chef-topbar__loc">{{ locationLabel() }}</span>
      @if (account(); as acc) {
        <span class="chef-topbar__user">{{ acc.login }}</span>
      }
      <button class="chef-topbar__logout" (click)="logout()">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        Ieși
      </button>
    </div>
  </header>

  <main class="chef-main">
    <router-outlet />
  </main>
</div>
