@defer (when loggers() && !isLoading()) {
  <div class="rv-admin-page">
    <div class="rv-admin-page-header">
      <div>
        <h1 class="rv-admin-page-title" id="logs-page-heading" data-cy="logsPageHeading">Loguri aplicație</h1>
        <p class="rv-admin-page-sub">{{ loggers()?.length }} loggere disponibile</p>
      </div>
    </div>

    <div class="rv-admin-table-wrap surface" style="margin-bottom: 0">
      <div style="padding: 1rem 1.25rem; border-bottom: 1px solid hsl(var(--border) / 0.5)">
        <div class="rv-form-group" style="flex-direction: row; align-items: center; gap: 0.75rem; margin: 0">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            style="color: hsl(var(--muted-foreground)); flex-shrink: 0"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input
            type="text"
            [ngModel]="filter()"
            (ngModelChange)="filter.set($event)"
            class="rv-input"
            placeholder="Filtrează loggere..."
            style="max-width: 340px"
          />
        </div>
      </div>
      <div class="rv-admin-table-scroll">
        <table class="rv-admin-table" aria-describedby="logs-page-heading">
          <thead>
            <tr jhiSort [(sortState)]="sortState">
              <th jhiSortBy="name" scope="col">Nume logger <fa-icon icon="sort" class="rv-sort-icon"></fa-icon></th>
              <th jhiSortBy="level" scope="col">Nivel log <fa-icon icon="sort" class="rv-sort-icon"></fa-icon></th>
            </tr>
          </thead>
          <tbody>
            @for (logger of filteredAndOrderedLoggers(); track $index) {
              <tr>
                <td class="rv-admin-cell-muted" style="font-size: 0.8rem; font-family: monospace">{{ logger.name | slice: 0 : 140 }}</td>
                <td>
                  <div class="rv-log-level-group">
                    <button
                      (click)="changeLevel(logger.name, 'TRACE')"
                      class="rv-log-btn"
                      [class.rv-log-btn--purple]="logger.level === 'TRACE'"
                    >
                      TRACE
                    </button>
                    <button
                      (click)="changeLevel(logger.name, 'DEBUG')"
                      class="rv-log-btn"
                      [class.rv-log-btn--blue]="logger.level === 'DEBUG'"
                    >
                      DEBUG
                    </button>
                    <button
                      (click)="changeLevel(logger.name, 'INFO')"
                      class="rv-log-btn"
                      [class.rv-log-btn--success]="logger.level === 'INFO'"
                    >
                      INFO
                    </button>
                    <button
                      (click)="changeLevel(logger.name, 'WARN')"
                      class="rv-log-btn"
                      [class.rv-log-btn--warning]="logger.level === 'WARN'"
                    >
                      WARN
                    </button>
                    <button
                      (click)="changeLevel(logger.name, 'ERROR')"
                      class="rv-log-btn"
                      [class.rv-log-btn--danger]="logger.level === 'ERROR'"
                    >
                      ERROR
                    </button>
                    <button (click)="changeLevel(logger.name, 'OFF')" class="rv-log-btn" [class.rv-log-btn--muted]="logger.level === 'OFF'">
                      OFF
                    </button>
                  </div>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
} @loading {
  <div class="rv-admin-page" style="display: flex; align-items: center; justify-content: center; min-height: 200px">
    <span class="rv-spinner" style="width: 28px; height: 28px; border-width: 3px; opacity: 0.5"></span>
  </div>
}
